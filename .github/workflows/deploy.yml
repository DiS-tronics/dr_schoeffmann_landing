name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          KEYSTATIC_GITHUB_CLIENT_ID: placeholder
          KEYSTATIC_GITHUB_CLIENT_SECRET: placeholder
          KEYSTATIC_SECRET: placeholder
